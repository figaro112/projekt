<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulátor konečných automatov</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        amber: tailwind.colors.amber
                    },
                    boxShadow: {
                        glow: '0 18px 60px rgba(180, 83, 9, 0.18)'
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body,
        #app {
            min-height: 100%;
            margin: 0;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(245, 158, 11, 0.10), transparent 30%),
                radial-gradient(circle at top right, rgba(180, 83, 9, 0.12), transparent 26%),
                linear-gradient(180deg, #120f0d 0%, #120f0d 100%);
        }

        body {
            color: #f5ede3;
        }

        ::selection {
            background: rgba(245, 158, 11, 0.28);
            color: #fffaf3;
        }

        .scrollbar-thin::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        .scrollbar-thin::-webkit-scrollbar-track {
            background: rgba(34, 27, 22, 0.85);
            border-radius: 999px;
        }

        .scrollbar-thin::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, rgba(217, 119, 6, 0.72), rgba(180, 83, 9, 0.72));
            border-radius: 999px;
            border: 2px solid rgba(34, 27, 22, 0.9);
        }

        .scrollbar-thin::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, rgba(251, 191, 36, 0.82), rgba(217, 119, 6, 0.82));
        }

        .graph-shell {
            background:
                radial-gradient(circle at top, rgba(245, 158, 11, 0.08), transparent 26%),
                linear-gradient(180deg, rgba(31, 24, 20, 0.96), rgba(22, 17, 14, 0.98));
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03), 0 18px 40px rgba(0, 0, 0, 0.22);
        }

        #automaton-canvas {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 24px;
        }

        .state-node circle {
            transition: transform 0.18s ease, filter 0.18s ease, stroke 0.18s ease;
            transform-box: fill-box;
            transform-origin: center;
        }

        .state-node:hover circle {
            filter: drop-shadow(0 10px 18px rgba(217, 119, 6, 0.18));
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script src="elm.js"></script>
    <script>
        const app = Elm.Main.init({
            node: document.getElementById('app'),
            flags: null
        });

        app.ports.downloadJsonFile.subscribe((jsonText) => {
            const blob = new Blob([jsonText], { type: 'application/json;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');

            link.href = url;
            link.download = 'automaton.json';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        });

        app.ports.requestJsonFile.subscribe(() => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json,application/json';

            input.addEventListener('change', (event) => {
                const file = event.target.files && event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = () => {
                    if (typeof reader.result === 'string') {
                        app.ports.jsonFileSelected.send(reader.result);
                    }
                };
                reader.readAsText(file);
            });

            input.click();
        });

        const serializeGraphSvg = () => {
            const svg = document.getElementById('automaton-canvas');
            if (!svg) return null;

            const clone = svg.cloneNode(true);
            clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
            clone.setAttribute('xmlns:xlink', 'http://www.w3.org/1999/xlink');

            return new XMLSerializer().serializeToString(clone);
        };

        const downloadBlob = (blob, filename) => {
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');

            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        };

        app.ports.exportGraphSvgFile.subscribe(() => {
            const serialized = serializeGraphSvg();
            if (!serialized) return;

            downloadBlob(new Blob([serialized], { type: 'image/svg+xml;charset=utf-8' }), 'automaton-graph.svg');
        });

        app.ports.exportGraphPngFile.subscribe(() => {
            const svg = document.getElementById('automaton-canvas');
            const serialized = serializeGraphSvg();
            if (!svg || !serialized) return;

            const image = new Image();
            const svgBlob = new Blob([serialized], { type: 'image/svg+xml;charset=utf-8' });
            const svgUrl = URL.createObjectURL(svgBlob);
            const viewBox = (svg.getAttribute('viewBox') || '0 0 980 680').split(/\s+/).map(Number);
            const width = viewBox[2] || svg.clientWidth || 980;
            const height = viewBox[3] || svg.clientHeight || 680;

            image.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;

                const context = canvas.getContext('2d');
                context.fillStyle = '#140f0d';
                context.fillRect(0, 0, width, height);
                context.drawImage(image, 0, 0, width, height);

                canvas.toBlob((blob) => {
                    if (blob) {
                        downloadBlob(blob, 'automaton-graph.png');
                    }
                    URL.revokeObjectURL(svgUrl);
                }, 'image/png');
            };

            image.onerror = () => {
                URL.revokeObjectURL(svgUrl);
            };

            image.src = svgUrl;
        });
    </script>
</body>
</html>
